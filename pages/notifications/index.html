<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | Expenses Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="../../styles/components.css">
  <link rel="stylesheet" href="../../styles/dashboard.css">
  
  <link rel="stylesheet" href="../../styles/notifications.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar shell">
      <div>
        <div class="brand">Catalyst</div>
        <div class="tier">Premium Tier</div>
      </div>
      <nav class="nav">
        <a href="../dashboard/index.html" class="nav-item"><img src="../../assets/icons/dashboard.png" alt="dashboard" srcset="" width="18px" height="18px"><span>Dashboard</span></a>
        <a href="../analytics/index.html" class="nav-item"><img src="../../assets/icons/analytics.png" alt="analytics" srcset="" width="18px" height="18px"><span>Analytics</span></a>
        <a href="../budget/index.html" class="nav-item"><img src="../../assets/icons/budget.png" alt="budget" srcset="" width="18px" height="18px"><span>Budget</span></a>
        <a href="../expenses/index.html" class="nav-item"><img src="../../assets/icons/expenses.png" alt="expenses" srcset="" width="18px" height="18px"><span>Expenses</span></a>
      </nav>
      <hr>
      <div class="sidebar-footer">
        <a href="../onboarding/index.html" class="nav-item logout"><img src="../../assets/icons/logout.png" alt="logout" srcset="" width="18px" height="18px"><span>Logout</span></a>
        <a href="../settings/index.html" class="sidebar-settings-link" title="Settings"><img src="../../assets/icons/settings.png" alt="settings" width="18px" height="18px"></a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar shell" style="position: relative;">
        <div class="hamburger">&#9776;</div>
        <div class="top-brand">Catalyst</div>
        <div class="top-actions">
          <div class="icons">
            <a href="#" class="topbar-notification" id="notifToggle">
              <img src="../../assets/icons/notification.png" alt="notification" width="20px" height="20px">
              <!-- Optional unread badge can be added here dynamically -->
            </a>
            <a href="../profile/index.html" class="topbar-profile">
              <img src="../../assets/icons/profile.png" alt="profile" width="20px" height="20px">
            </a>
          </div>
        </div>

        <!-- Notification Dropdown Modal -->
        <div class="notification-dropdown" id="notifDropdown">
          <div class="notif-header">
            <h3>Notifications</h3>
            <button class="notif-clear-btn" id="clearNotifsBtn">Clear All</button>
          </div>
          <div class="notif-body" id="notifList">
            <!-- Items injected by notifications.js -->
          </div>
        </div>
      </header>

      <div class="content">
        <section style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center;">
          <img src="../../assets/icons/notification.png" alt="notifications" width="64px" style="opacity: 0.5; margin-bottom: 24px;">
          <h1 style="color: #fff; font-size: 24px; margin-bottom: 8px;">Notification Center</h1>
          <p style="color: var(--muted); max-width: 400px; line-height: 1.5;">Review alerts, warnings, and system updates securely. Click the bell icon in the top right to access the quick-view dropdown.</p>
        </section>
      </div>
    </main>
  </div>

  <script src="./notifications.js"></script>
</body>
</html>
