<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Expenses Tracker</title>
  <link rel="icon" type="image/x-icon" href="../../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="../../styles/components.css">
  <link rel="stylesheet" href="../../styles/profile.css">
  <link rel="stylesheet" href="../../styles/notifications.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar shell">
      <div>
        <div class="brand">Catalyst</div>
        <div class="tier">Premium Tier</div>
      </div>
      <nav class="nav">
        <a href="../dashboard/index.html" class="nav-item"><img src="../../assets/icons/dashboard.png" alt="dashboard" srcset="" width="18px" height="18px"></span>Dashboard</a>
        <a href="../analytics/index.html" class="nav-item"><img src="../../assets/icons/analytics.png" alt="analytics" srcset="" width="18px" height="18px"></span>Analytics</a>
        <a href="../budget/index.html" class="nav-item"><img src="../../assets/icons/budget.png" alt="budget" srcset="" width="18px" height="18px"></span>Budget</a>
        <a href="../expenses/index.html" class="nav-item"><img src="../../assets/icons/expenses.png" alt="expenses" srcset="" width="18px" height="18px"></span>Expenses</a>
      </nav>
      <hr>
      <div class="sidebar-footer">
        <a href="../onboarding/index.html" class="nav-item logout"><img src="../../assets/icons/logout.png" alt="logout" srcset="" width="18px" height="18px"></span>Logout</a>
        <a href="../settings/index.html" class="sidebar-settings-link" title="Settings"><img src="../../assets/icons/settings.png" alt="settings" width="18px" height="18px"></a>
      </div>
    </aside>
    <main class="main">
      <header class="topbar shell">
        <div class="hamburger">&#9776;</div>
        <div class="top-brand">User Profile</div>
        <div class="top-actions">
          <div class="icons">
            <a href="../notifications/index.html" class="topbar-notification">
              <img src="../../assets/icons/notification.png" alt="notification" width="20px" height="20px">
            </a>
            <a href="../profile/index.html" class="topbar-profile active">
              <img src="../../assets/icons/profile.png" alt="profile" width="20px" height="20px">
            </a>
          </div>
        </div>
      </header>
      <div class="content">
        <section class="profile-header">
          <div class="avatar">Y</div>
          <div class="profile-info">
            <h1>Yacin Ben</h1>
            <p>Premium Member • Member since March 2026</p>
          </div>
        </section>
        
        <section class="stats-grid">
          <div class="card stat-card">
            <span class="label">Total Managed</span>
            <div class="value">$124,500.00</div>
          </div>
          <div class="card stat-card">
            <span class="label">Transactions</span>
            <div class="value">1,245</div>
          </div>
          <div class="card stat-card">
            <span class="label">Savings Rate</span>
            <div class="value">24.5%</div>
          </div>
        </section>

        <section class="card account-details">
          <div class="detail-item">
            <label>Full Name</label>
            <div class="value">Yacin Ben</div>
          </div>
          <div class="detail-item">
            <label>Email Address</label>
            <div class="value">yacin@example.com</div>
          </div>
          <div class="detail-item">
            <label>Phone Number</label>
            <div class="value">+1 (555) 000-0000</div>
          </div>
          <div class="detail-item">
            <label>Location</label>
            <div class="value">Paris, France</div>
          </div>
        </section>
      </div>
    </main>
    <div class="sidebar-overlay"></div>
  </div>
  <script src="../../js/sidebar.js"></script>
  <script src="../notifications/notifications.js"></script>
</body>
</html>
